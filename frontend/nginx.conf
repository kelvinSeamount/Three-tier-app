# Nginx is a web server that serves the React build files.
# Think of it as the dining room manager who hands out menus (HTML/JS files).
server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        # This is critical for React Router: if the file isn't found,
        # serve index.html and let React handle the routing.
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* requests to the backend service.
    # This is how the dining room calls the kitchen — through the waiter (nginx proxy).
    location /api/ {
        proxy_pass http://backend-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
